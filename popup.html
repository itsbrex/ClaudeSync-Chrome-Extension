<!-- popup.html -->
<!DOCTYPE html>
<html>
	<head>
		<title>Claude Project Updater</title>
		<style>
			body {
				width: 350px;
				padding: 15px;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
				font-size: 14px;
				background: #0d1117;
				color: #f0f6fc;
			}
			h2 {
				margin: 0 0 10px 0;
				font-size: 18px;
				color: #f0f6fc;
			}
			.section {
				margin-bottom: 15px;
				padding: 10px;
				border: 1px solid #30363d;
				border-radius: 6px;
				background: #161b22;
			}
			.section h3 {
				margin: 0 0 8px 0;
				font-size: 14px;
				font-weight: 600;
				color: #f0f6fc;
			}
			button {
				width: 100%;
				margin-top: 8px;
				padding: 8px 16px;
				border: 1px solid transparent;
				border-radius: 6px;
				cursor: pointer;
				font-size: 14px;
				font-weight: 500;
				transition: all 0.2s ease;
			}
			button:disabled {
				opacity: 0.6;
				cursor: not-allowed;
			}
			.primary-btn {
				background: #238636;
				color: #ffffff;
				border-color: #238636;
			}
			.primary-btn:hover:not(:disabled) {
				background: #2ea043;
				border-color: #2ea043;
			}
			.secondary-btn {
				background: #21262d;
				color: #f0f6fc;
				border-color: #30363d;
			}
			.secondary-btn:hover:not(:disabled) {
				background: #30363d;
				border-color: #8b949e;
			}
			.danger-btn {
				background: #da3633;
				color: #ffffff;
				border-color: #da3633;
			}
			.danger-btn:hover:not(:disabled) {
				background: #f85149;
				border-color: #f85149;
			}
			input {
				width: 100%;
				padding: 8px 12px;
				border: 1px solid #30363d;
				border-radius: 6px;
				font-size: 14px;
				box-sizing: border-box;
				background: #0d1117;
				color: #f0f6fc;
			}
			input:focus {
				outline: none;
				border-color: #58a6ff;
				box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.3);
			}
			input::placeholder {
				color: #8b949e;
			}
			.status {
				margin-top: 8px;
				padding: 8px 12px;
				border-radius: 6px;
				font-size: 13px;
				border: 1px solid transparent;
			}
			.status.success {
				background: rgba(46, 160, 67, 0.15);
				color: #3fb950;
				border-color: rgba(46, 160, 67, 0.4);
			}
			.status.error {
				background: rgba(248, 81, 73, 0.15);
				color: #f85149;
				border-color: rgba(248, 81, 73, 0.4);
			}
			.status.info {
				background: rgba(88, 166, 255, 0.15);
				color: #58a6ff;
				border-color: rgba(88, 166, 255, 0.4);
			}
			.token-status {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 8px;
			}
			.status-indicator {
				width: 8px;
				height: 8px;
				border-radius: 50%;
			}
			.status-indicator.valid {
				background: #3fb950;
			}
			.status-indicator.invalid {
				background: #f85149;
			}
			.status-indicator.unknown {
				background: #8b949e;
			}
			.small-text {
				font-size: 12px;
				color: #8b949e;
				margin-top: 5px;
			}
		</style>
	</head>
	<body>
		<h2>Claude Project Updater</h2>
		
		<div class="section">
			<h3>GitHub Access Token</h3>
			<div class="token-status">
				<div id="tokenIndicator" class="status-indicator unknown"></div>
				<span id="tokenStatusText">Not configured</span>
			</div>
			<input type="password" id="tokenInput" placeholder="Enter GitHub personal access token" />
			<div class="small-text">
				Required for private repositories. Token should have 'repo' scope.
			</div>
			<button id="saveTokenBtn" class="primary-btn">Save Token</button>
			<button id="clearTokenBtn" class="danger-btn" style="display: none;">Clear Token</button>
		</div>
		
		<div class="section">
			<h3>Project Sync</h3>
			<p style="margin: 0 0 8px 0; font-size: 13px;">
				Update your Claude project with files from a GitHub repository.
			</p>
			<button id="updateButton" class="secondary-btn">Update Project</button>
		</div>
		
		<div id="status"></div>

		<script src="popup.js"></script>
	</body>
</html>
